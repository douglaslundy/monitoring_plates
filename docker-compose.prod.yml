version: "3.9"

networks:
  monitoramento_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:

services:
  postgres:
    image: postgres:15
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoramento_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - monitoramento_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build: ./backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command: >
      sh -c "alembic upgrade head &&
             python -m app.core.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monitoramento_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build: ./backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command: celery -A app.workers.frame_processor worker --loglevel=warning -Q frames --concurrency=2
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monitoramento_net

  retention-worker:
    build: ./backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command: celery -A app.workers.retention_cleaner beat --loglevel=warning
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monitoramento_net

  frontend:
    build: ./frontend
    restart: always
    env_file: .env.prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - monitoramento_net

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - monitoramento_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://backend:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
