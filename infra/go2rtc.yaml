# Configuração do go2rtc (live WebRTC).
# Câmeras normais são cadastradas dinamicamente pelo backend/capture-runner via
# API (REST PUT /api/streams) e não precisam ser listadas aqui.
#
# Câmeras DUAL-LENS também são cadastradas via API — sem precisar editar este
# arquivo nem o go2rtc.local.yaml. O go2rtc recusa via API fontes que contenham
# ESPAÇOS ("source with spaces may be insecure"), o que antes impedia mandar o
# comando ffmpeg de recorte. A solução: os templates de recorte (`lens_lower` /
# `lens_upper`) ficam definidos AQUI (config, que aceita espaços) e o backend
# registra cada câmera com uma fonte SEM espaços que apenas referencia o
# template por nome, ex.:  ffmpeg:<rtsp-url>#video=lens_lower
#   - lens_lower (metade de baixo): crop=iw:ih/2:0:ih/2
#   - lens_upper (metade de cima):  crop=iw:ih/2:0:0

api:
  listen: ":1984"

# Templates ffmpeg reutilizáveis para o recorte de lente (transcodifica para
# H.264 de baixa latência já recortado). Referenciados pela fonte da câmera via
# `#video=lens_lower` / `#video=lens_upper` — string sem espaços, aceita pela API.
ffmpeg:
  lens_lower: "-codec:v libx264 -g:v 30 -preset:v superfast -tune:v zerolatency -profile:v baseline -pix_fmt:v yuv420p -vf crop=iw:ih/2:0:ih/2"
  lens_upper: "-codec:v libx264 -g:v 30 -preset:v superfast -tune:v zerolatency -profile:v baseline -pix_fmt:v yuv420p -vf crop=iw:ih/2:0:0"

webrtc:
  # Candidato ICE para o navegador conectar ao go2rtc. Ajuste o IP para o host
  # onde o go2rtc roda (VPS). Em LAN, o IP da VPS resolve direto.
  candidates:
    - 192.168.0.115:8555

log:
  level: info
